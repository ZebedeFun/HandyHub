version: '3.8'

services:
  handytime:
    build:
      context: .
      dockerfile: Dockerfile
    image: handytime:latest
    container_name: handytime_app
    ports:
      - "3001:3001"
    restart: unless-stopped
    volumes:
      # Persist settings across container rebuilds. Create this dir first:
      # mkdir -p ./data
      - ./data:/app/backend/data
    environment:
      - NODE_ENV=production
      - PORT=3001

# Example: Uncomment and customise to connect to an nginx proxy network
# networks:
#   nginx-proxy-nw:
#     external: true
