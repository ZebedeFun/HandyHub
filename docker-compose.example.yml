version: '3.8'

services:
  handytime:
    build:
      context: .
      dockerfile: Dockerfile
    image: handytime:latest
    container_name: handytime_app
    ports:
      - "${PORT:-3001}:3001"
    restart: unless-stopped
    volumes:
      # Persist settings across container rebuilds. Create this dir first:
      # mkdir -p ./data
      - ./data:/app/backend/data
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001

  # Optional: Kokoro TTS Container
  # Uncomment this block if you want to host Kokoro TTS locally alongside HandyTime.
  # If you already have a Kokoro instance running elsewhere, leave this commented out
  # and point HandyTime's settings to your existing URL.
  # kokoro-tts:
  #   image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
  #   container_name: kokoro-tts
  #   restart: unless-stopped
  #   ports:
  #     - "8880:8880"
  #   environment:
  #     - ONNX_NUM_THREADS=4
  #     - ONNX_INTER_OP_THREADS=2
  #     - PYTORCH_NUM_THREADS=4
  #   volumes:
  #     - ./kokoro/models:/app/api/src/models
  #     - ./kokoro/voices:/app/api/src/voices
  #     - ./kokoro/temp:/tmp/kokoro

# Example: Uncomment and customise to connect to an nginx proxy network
# networks:
#   default:
#     name: nginx-proxy-nw
#     external: true
